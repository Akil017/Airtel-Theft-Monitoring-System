worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

# RTMP server — receives stream from CP Plus camera
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        timeout 30s;

        application live {
            live on;
            record off;

            # Allow camera to push from anywhere
            allow publish all;
            allow play all;

            # HLS output so browser can preview stream
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2s;
            hls_playlist_length 10s;
        }
    }
}

http {
    server {
        listen 8080;

        # HLS stream preview
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # Stream health check
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /health {
            return 200 '{"status":"ok","rtmp_port":1935}';
            add_header Content-Type application/json;
        }
    }
}

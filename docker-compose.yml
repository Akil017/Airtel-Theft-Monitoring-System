version: "3.9"

services:

  # ── RTMP Server ─────────────────────────────────────────────────────────────
  # Receives live stream pushed from CP Plus EZ-S35T camera
  # Camera RTMP URL to set in EzyLiv+ app:
  #   rtmp://49.37.110.161:1935/live/bts01
  rtmp-server:
    build: ./rtmp-server
    container_name: airtel-rtmp
    restart: unless-stopped
    ports:
      - "1935:1935"    # RTMP ingest — camera pushes here
      - "8080:8080"    # HLS preview — watch stream in browser
    volumes:
      - /tmp/hls:/tmp/hls

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: airtel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     airtel
      POSTGRES_PASSWORD: airtel
      POSTGRES_DB:       airtel_monitor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U airtel"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── Detection Service ────────────────────────────────────────────────────────
  # Reads from RTMP server, runs YOLOv8s, posts events to event-processor
  # Also controls CP Plus hooter via Tuya/HTTP API
  detection-service:
    build: ./detection-service
    container_name: airtel-detector
    restart: unless-stopped
    env_file: .env
    environment:
      EVENT_PROCESSOR_URL: http://event-processor:8001
      # Reads RTMP stream from rtmp-server container
      RTSP_URL: rtmp://rtmp-server:1935/live/bts01
    depends_on:
      - event-processor
      - rtmp-server
    volumes:
      - ./detection-service:/app

  # ── Event Processor ──────────────────────────────────────────────────────────
  event-processor:
    build: ./event-processor
    container_name: airtel-event-proc
    restart: unless-stopped
    env_file: .env
    environment:
      ALARM_MANAGER_URL: http://alarm-manager:8002
    ports:
      - "8001:8001"
    depends_on:
      - alarm-manager
    volumes:
      - ./event-processor:/app
      - ./shared:/shared

  # ── Alarm Manager ────────────────────────────────────────────────────────────
  alarm-manager:
    build: ./alarm-manager
    container_name: airtel-alarm-mgr
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://airtel:airtel@postgres:5432/airtel_monitor
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./alarm-manager:/app
      - ./shared:/shared

  # ── NOC Dashboard ─────────────────────────────────────────────────────────────
  dashboard:
    build: ./dashboard
    container_name: airtel-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_ALARM_MANAGER_WS:  ws://49.37.110.161:8002/ws
      NEXT_PUBLIC_ALARM_MANAGER_URL: http://49.37.110.161:8002
    ports:
      - "3000:3000"
    depends_on:
      - alarm-manager

  # ── eNode NOC Server ──────────────────────────────────────────────────────────
  enode-noc:
    build: ./enode-noc
    container_name: airtel-enode
    restart: unless-stopped
    env_file: .env
    ports:
      - "9000:9000"
    depends_on:
      - alarm-manager

volumes:
  postgres_data:
